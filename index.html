<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nursing Solution Store & Test Series</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
body{ background:#f3f3f3; }
header{ background:#131921; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
.logo{ font-size:28px; font-weight:bold; }
.search{ width:50%; min-width:250px; padding:10px; border:none; border-radius:5px; }
.nav{ background:#232f3e; padding:12px; display:flex; justify-content:center; gap:20px; flex-wrap:wrap; }
.nav a{ color:white; text-decoration:none; font-weight:bold; }
.banner{ background:white; padding:50px 20px; text-align:center; margin-bottom:20px; }
.banner h1{ font-size:40px; margin-bottom:10px; }
.banner p{ font-size:18px; color:#555; }
.products{ display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; padding:20px; }
.card{ background:white; padding:15px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.1); text-align:center; transition:.3s; }
.card:hover{ transform:translateY(-5px); }
.card img{ width:100%; height:220px; object-fit:cover; border-radius:8px; }
.card h3{ margin-top:10px; margin-bottom:10px; }
.card p{ color:#666; margin-bottom:10px; }
.price{ font-size:22px; font-weight:bold; margin:10px 0; color:green; }
.btn{ background:#ff9900; border:none; padding:10px 20px; cursor:pointer; border-radius:5px; font-weight:bold; width:100%; margin-bottom:5px; }
.btn.test-btn { background:#00a8ff; color:white; }
.btn:hover{ opacity:0.9; }
.loading{ text-align:center; padding:40px; font-size:22px; }

/* Modals */
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:1000; }
.modal-content { background:white; padding:25px; border-radius:10px; width:90%; max-width:500px; text-align:left; box-shadow:0 5px 15px rgba(0,0,0,0.3); max-height:85vh; overflow-y:auto; }
.modal-content h2 { margin-bottom:15px; font-size:22px; color:#131921; }
.modal-content label { display:block; margin:10px 0 5px; font-weight:bold; }
.modal-content input { width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; margin-bottom:10px; }
.close-modal { float:right; font-size:24px; cursor:pointer; font-weight:bold; color:#666; }

/* Quiz Styling */
.quiz-q { font-size:18px; font-weight:bold; margin-bottom:15px; color:#232f3e; }
.option-label { display:block; background:#f9f9f9; padding:12px; margin:8px 0; border:1px solid #ddd; border-radius:5px; cursor:pointer; transition:0.2s; }
.option-label:hover { background:#e2f0cb; }
.option-label input { width:auto; margin-right:10px; }

footer{ background:#131921; color:white; text-align:center; padding:20px; margin-top:30px; }
</style>
</head>
<body>

<header>
<div class="logo">Nursing Solution</div>
<input type="text" class="search" id="searchBox" placeholder="Search Notes or Tests..." onkeyup="searchProducts()">
</header>

<div class="nav">
<a href="#">Home</a>
<a href="#">Notes Store</a>
<a href="#">Online Test Series</a>
</div>

<section class="banner">
<h1>Nursing Solution Store</h1>
<p>Live Mock Tests & Premium Nursing PDF Notes</p>
</section>

<section id="products" class="products">
<div class="loading">Loading Store Items...</div>
</section>

<div id="checkoutModal" class="modal">
  <div class="modal-content">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <h2>Student Details</h2>
    <p id="modalProdName" style="font-weight:bold; color:#555; margin-bottom:10px;"></p>
    <form id="orderForm" onsubmit="handleOrderSubmit(event)">
      <label>Full Name</label><input type="text" id="studentName" required>
      <label>Email Address</label><input type="email" id="studentEmail" required>
      <label>Mobile Number</label><input type="tel" id="studentMobile" pattern="[0-9]{10}" required>
      <button type="submit" class="btn" style="background:#ff9900;" id="payBtnText">Proceed to Payment</button>
    </form>
  </div>
</div>

<div id="quizModal" class="modal">
  <div class="modal-content">
    <span class="close-modal" onclick="closeQuizModal()">&times;</span>
    <h2 id="quizTitle">Online Mock Test</h2>
    <hr style="margin-bottom:15px;">
    <div id="quizContainer">
      </div>
  </div>
</div>

<footer>© 2026 Nursing Solution | All Rights Reserved</footer>

<script>
// Aapka naya Web App URL yahan update ho gaya hai
const API = "https://script.google.com/macros/s/AKfycbxW2qh4XL-WRlJ7lPZ1zzB6e2S1CPN1OJ59oYrqnu-ih5SY45VjL0cnJtH7e8PSiIM_Hg/exec";

let allProducts = [];
let selectedProduct = null;
let currentQuestions = [];

async function loadProducts(){
  try{
    const response = await fetch(API);
    const products = await response.json();
    allProducts = products;
    displayProducts(products);
  } catch(error){
    document.getElementById("products").innerHTML = "<h2>Failed to Load Store Data</h2>";
  }
}

function displayProducts(products){
  let html = "";
  products.forEach(product=>{
    let buttonHtml = "";
    if(product.type && product.type.toLowerCase() === 'test') {
      buttonHtml = `<button class="btn test-btn" onclick="loadQuizData('${product.id}', '${product.name}')">📝 Start Mock Test</button>`;
    } else {
      buttonHtml = `<button class="btn" onclick="openCheckout('${product.id}', '${product.name}', '${product.price}')">🛍️ Buy Now</button>`;
    }

    html += `
      <div class="card">
        <img src="${product.image || 'https://via.placeholder.com/300x220'}">
        <h3>${product.name}</h3>
        <p style="background:#ddd; display:inline-block; padding:2px 8px; border-radius:3px; font-size:12px;">${product.type || 'PDF'}</p>
        <div class="price">₹${product.price}</div>
        ${buttonHtml}
      </div>
    `;
  });
  if(products.length===0) html = `<h2 style="text-align:center; grid-column:1/-1;">No Data Found</h2>`;
  document.getElementById("products").innerHTML = html;
}

async function loadQuizData(testId, testName) {
  document.getElementById("quizTitle").innerText = testName;
  document.getElementById("quizContainer").innerHTML = "<h3>Loading Questions from Sheet... Please wait...</h3>";
  document.getElementById("quizModal").style.display = "flex";
  
  try {
    const response = await fetch(`${API}?action=getQuestions&testId=${testId}`);
    currentQuestions = await response.json();
    
    if(currentQuestions.length === 0) {
      document.getElementById("quizContainer").innerHTML = "<h3 style='color:red;'>इस टेस्ट में अभी कोई सवाल नहीं जोड़े गए हैं! कृपया 'Questions' शीट चेक करें।</h3>";
      return;
    }
    renderQuestions();
  } catch (error) {
    document.getElementById("quizContainer").innerHTML = "<h3 style='color:red;'>Error loading questions.</h3>";
  }
}

function renderQuestions() {
  let html = "";
  currentQuestions.forEach((q, index) => {
    html += `
      <div style="margin-bottom:25px; border-bottom:1px dashed #ccc; padding-bottom:15px;">
        <p class="quiz-q">Q${index+1}. ${q.question}</p>
        <label class="option-label"><input type="radio" name="q_${index}" value="A"> ${q.a}</label>
        <label class="option-label"><input type="radio" name="q_${index}" value="B"> ${q.b}</label>
        <label class="option-label"><input type="radio" name="q_${index}" value="C"> ${q.c}</label>
        <label class="option-label"><input type="radio" name="q_${index}" value="D"> ${q.d}</label>
      </div>
    `;
  });
  html += `<button class="btn" style="background:green; color:white;" onclick="calculateScore()">Submit Test</button>`;
  document.getElementById("quizContainer").innerHTML = html;
}

function calculateScore() {
  let score = 0;
  currentQuestions.forEach((q, index) => {
    const selected = document.querySelector(`input[name="q_${index}"]:checked`);
    if(selected && selected.value === q.correct) {
      score++;
    }
  });
  
  document.getElementById("quizContainer").innerHTML = `
    <div style="text-align:center; padding:20px;">
      <h1 style="color:green; font-size:40px;">🎯 Test Submitted!</h1>
      <p style="font-size:22px; margin:15px 0;">Your Score: <strong>${score} / ${currentQuestions.length}</strong></p>
      <button class="btn" onclick="closeQuizModal()">Close Window</button>
    </div>
  `;
}

function openCheckout(id, name, price) {
  selectedProduct = { id, name, price };
  document.getElementById("modalProdName").innerText = `${name} - ₹${price}`;
  document.getElementById("checkoutModal").style.display = "flex";
}
function closeModal() { document.getElementById("checkoutModal").style.display = "none"; document.getElementById("orderForm").reset(); }
function closeQuizModal() { document.getElementById("quizModal").style.display = "none"; }

async function handleOrderSubmit(event) {
  event.preventDefault();
  const name = document.getElementById("studentName").value;
  const email = document.getElementById("studentEmail").value;
  const mobile = document.getElementById("studentMobile").value;
  const payBtn = document.getElementById("payBtnText");
  payBtn.innerText = "Processing..."; payBtn.disabled = true;

  try {
    fetch(API, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name, email, mobile, productId: selectedProduct.id, amount: selectedProduct.price }) });
    setTimeout(() => { window.open("https://rzp.io/rzp/j6fXuiS", "_blank"); closeModal(); payBtn.innerText = "Proceed to Payment"; payBtn.disabled = false; }, 1200);
  } catch (error) { window.open("https://rzp.io/rzp/j6fXuiS", "_blank"); closeModal(); }
}

function searchProducts(){
  const keyword = document.getElementById("searchBox").value.toLowerCase();
  const filtered = allProducts.filter(item => (item.name || "").toLowerCase().includes(keyword));
  displayProducts(filtered);
}
loadProducts();
</script>
</body>
</html>
