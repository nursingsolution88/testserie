<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nursing Solution Store</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
body{ background:#f3f3f3; }
header{ background:#131921; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
.logo{ font-size:28px; font-weight:bold; }
.search{ width:50%; min-width:250px; padding:10px; border:none; border-radius:5px; }
.nav{ background:#232f3e; padding:12px; display:flex; justify-content:center; gap:20px; flex-wrap:wrap; }
.nav a{ color:white; text-decoration:none; font-weight:bold; }
.banner{ background:white; padding:50px 20px; text-align:center; margin-bottom:20px; }
.banner h1{ font-size:40px; margin-bottom:10px; }
.banner p{ font-size:18px; color:#555; }
.products{ display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; padding:20px; }
.card{ background:white; padding:15px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.1); text-align:center; transition:.3s; }
.card:hover{ transform:translateY(-5px); }
.card img{ width:100%; height:220px; object-fit:cover; border-radius:8px; }
.card h3{ margin-top:10px; margin-bottom:10px; }
.card p{ color:#666; margin-bottom:10px; }
.price{ font-size:22px; font-weight:bold; margin:10px 0; color:green; }
.btn{ background:#ff9900; border:none; padding:10px 20px; cursor:pointer; border-radius:5px; font-weight:bold; width:100%; }
.btn:hover{ background:#e68a00; }
.loading{ text-align:center; padding:40px; font-size:22px; }
.social{ text-align:center; padding:30px; }
.social a{ display:inline-block; margin:10px; padding:10px 20px; background:#131921; color:white; text-decoration:none; border-radius:5px; }
footer{ background:#131921; color:white; text-align:center; padding:20px; margin-top:30px; }
.telegram-btn{ position:fixed; bottom:20px; right:20px; background:#0088cc; color:white; padding:12px 18px; border-radius:50px; text-decoration:none; font-weight:bold; z-index:999; }

/* Checkout Modal Styling */
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:1000; }
.modal-content { background:white; padding:25px; border-radius:10px; width:90%; max-width:400px; text-align:left; box-shadow:0 5px 15px rgba(0,0,0,0.3); }
.modal-content h2 { margin-bottom:15px; font-size:22px; color:#131921; }
.modal-content label { display:block; margin:10px 0 5px; font-weight:bold; }
.modal-content input { width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; margin-bottom:10px; }
.modal-btn { background:#ff9900; border:none; padding:12px; cursor:pointer; border-radius:5px; font-weight:bold; width:100%; margin-top:10px; color:black; font-size:16px; }
.close-modal { float:right; font-size:24px; cursor:pointer; font-weight:bold; color:#666; }

@media(max-width:768px){ .search{ width:100%; } .banner h1{ font-size:28px; } }
</style>
</head>

<body>

<header>
<div class="logo">Nursing Solution</div>
<input type="text" class="search" id="searchBox" placeholder="Search Notes, PDFs, Test Series..." onkeyup="searchProducts()">
</header>

<div class="nav">
<a href="#">Home</a>
<a href="#">Notes</a>
<a href="#">PDF Store</a>
<a href="#">Test Series</a>
<a href="#">Contact</a>
</div>

<section class="banner">
<h1>Nursing Solution Store</h1>
<p>B.Sc Nursing • GNM • ANM • CHO • NORCET</p>
</section>

<section id="products" class="products">
<div class="loading">Loading Products...</div>
</section>

<div id="checkoutModal" class="modal">
  <div class="modal-content">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <h2>Student Details</h2>
    <p id="modalProdName" style="font-weight:bold; color:#555; margin-bottom:10px;"></p>
    
    <form id="orderForm" onsubmit="handleOrderSubmit(event)">
      <label>Full Name</label>
      <input type="text" id="studentName" required placeholder="Enter your full name">
      
      <label>Email Address</label>
      <input type="email" id="studentEmail" required placeholder="Enter your email">
      
      <label>Mobile Number</label>
      <input type="tel" id="studentMobile" pattern="[0-9]{10}" required placeholder="10 digit mobile number">
      
      <button type="submit" class="modal-btn" id="payBtnText">Proceed to Payment</button>
    </form>
  </div>
</div>

<div class="social">
<a href="https://t.me/nursingsolution88" target="_blank">Telegram</a>
<a href="https://whatsapp.com/channel/0029Vb60ICxBPzjUZDBd680p" target="_blank">WhatsApp</a>
<a href="https://instagram.com/nursingsolution88" target="_blank">Instagram</a>
</div>

<a class="telegram-btn" href="https://t.me/nursingsolution88" target="_blank">Join Telegram</a>

<footer>© 2026 Nursing Solution | All Rights Reserved</footer>

<script>
// ⚠️ यहाँ अपना नया Google Apps Script Web App URL डालें
const API = "https://script.google.com/macros/s/AKfycbxCcAw5Rr8JuahjuepvK17yW0gxyhx5lV1RsQcobdQiaCr5MPAl8vNiAsAlqUH4FeVT4Q/exec
  ";

let allProducts = [];
let selectedProduct = null;

async function loadProducts(){
  try{
    const response = await fetch(API);
    const products = await response.json();
    allProducts = products;
    displayProducts(products);
  } catch(error){
    document.getElementById("products").innerHTML = "<h2>Failed to Load Products</h2>";
    console.error(error);
  }
}

function displayProducts(products){
  let html = "";
  products.forEach(product=>{
    html += `
      <div class="card">
        <img src="${product.image || 'https://via.placeholder.com/300x220'}">
        <h3>${product.name}</h3>
        <p>${product.type}</p>
        <div class="price">₹${product.price}</div>
        <button class="btn" onclick="openCheckout('${product.id}', '${product.name}', '${product.price}')">Buy Now</button>
      </div>
    `;
  });

  if(products.length===0){
    html = `<h2 style="text-align:center; grid-column: 1/-1;">No Products Found</h2>`;
  }
  document.getElementById("products").innerHTML = html;
}

// Checkout Modal ओपन करने के लिए
function openCheckout(id, name, price) {
  selectedProduct = { id, name, price };
  document.getElementById("modalProdName").innerText = `${name} - ₹${price}`;
  document.getElementById("checkoutModal").style.display = "flex";
}

// Modal बंद करने के लिए
function closeModal() {
  document.getElementById("checkoutModal").style.display = "none";
  document.getElementById("orderForm").reset();
}

// फॉर्म सबमिट होने पर डेटा शीट में भेजने और पेमेंट लिंक खोलने के लिए
async function handleOrderSubmit(event) {
  event.preventDefault();
  
  const name = document.getElementById("studentName").value;
  const email = document.getElementById("studentEmail").value;
  const mobile = document.getElementById("studentMobile").value;
  
  const payBtn = document.getElementById("payBtnText");
  payBtn.innerText = "Processing... Please Wait";
  payBtn.disabled = true;

  const orderPayload = {
    name: name,
    email: email,
    mobile: mobile,
    productId: selectedProduct.id,
    amount: selectedProduct.price
  };

  try {
    // Google Sheet (POST Request) में डेटा भेजें
    const response = await fetch(API, {
      method: "POST",
      body: JSON.stringify(orderPayload)
    });
    
    const result = await response.json();
    
    if(result.status === "success") {
      // डेटा सेव होने के बाद सीधा Razorpay लिंक पर रीडायरेक्ट करें
      window.open("https://rzp.io/rzp/j6fXuiS", "_blank");
      closeModal();
    } else {
      alert("Order processing failed, please try again.");
    }
  } catch (error) {
    console.error("Error saving order:", error);
    // नेटवर्क एरर होने पर भी छात्र का पेमेंट न रुके, इसलिए लिंक खोल दें
    window.open("https://rzp.io/rzp/j6fXuiS", "_blank");
    closeModal();
  } finally {
    payBtn.innerText = "Proceed to Payment";
    payBtn.disabled = false;
  }
}

function searchProducts(){
  const keyword = document.getElementById("searchBox").value.toLowerCase();
  const filtered = allProducts.filter(item => (item.name || "").toLowerCase().includes(keyword));
  displayProducts(filtered);
}

loadProducts();
</script>

</body>
</html>
