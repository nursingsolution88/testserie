```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
</head>
<body>

<h2>Add Test</h2>

<input id="testId" placeholder="Test ID"><br><br>
<input id="title" placeholder="Title"><br><br>
<input id="price" placeholder="Price"><br><br>

<button onclick="addTest()">Add Test</button>

<div id="result"></div>

<script>

const API = "PASTE_YOUR_APPS_SCRIPT_WEBAPP_URL_HERE";

async function addTest(){

const data = {
action:"addTest",
testId:document.getElementById("testId").value,
title:document.getElementById("title").value,
type:"Free",
price:document.getElementById("price").value,
description:"Demo"
};

try{

const response = await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

const text = await response.text();

document.getElementById("result").innerHTML = text;

console.log(text);

}catch(err){

document.getElementById("result").innerHTML =
"ERROR : " + err;

console.log(err);

}

}

</script>

</body>
</html>
