<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nursing Solution Test Series</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

.header{
background:#0066cc;
color:white;
padding:20px;
border-radius:12px;
text-align:center;
margin-bottom:20px;
}

.search-box{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:20px;
}

.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.filter-btn{
padding:10px 15px;
border:none;
background:#ddd;
cursor:pointer;
border-radius:8px;
}

.filter-btn.active{
background:#0066cc;
color:white;
}

.tests{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:15px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card h3{
margin-bottom:10px;
}

.badge{
display:inline-block;
padding:5px 10px;
border-radius:20px;
font-size:12px;
color:white;
margin-bottom:10px;
}

.free{
background:green;
}

.paid{
background:red;
}

.start-btn{
display:block;
width:100%;
padding:10px;
background:#0066cc;
color:white;
text-decoration:none;
text-align:center;
border-radius:8px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
<h1>🏥 Nursing Solution Test Series</h1>
<p>CHO • NORCET • GNM • BSc Nursing</p>
</div>

<input
type="text"
id="search"
class="search-box"
placeholder="Search Test..."
>

<div class="filters">
<button class="filter-btn active" onclick="filterTests('all')">All</button>
<button class="filter-btn" onclick="filterTests('CHO')">CHO</button>
<button class="filter-btn" onclick="filterTests('NORCET')">NORCET</button>
<button class="filter-btn" onclick="filterTests('GNM')">GNM</button>
<button class="filter-btn" onclick="filterTests('BSC')">BSc</button>
</div>

<div class="tests" id="tests"></div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycby7NJhNamHWoVK3yPZrEOAk6JeEN5yTByzXnsYcIKQK7K2XViLIrgPSPGRmM17bMQY/exec?action=tests";

let allTests = [];

async function loadTests(){

const res = await fetch(API_URL);
allTests = await res.json();

displayTests(allTests);

}

function displayTests(data){

const container = document.getElementById("tests");

container.innerHTML = "";

data.forEach(test=>{

container.innerHTML += `
<div class="card">

<h3>${test.title}</h3>

<span class="badge ${test.type}">
${test.type.toUpperCase()}
</span>

<p>📚 Category: ${test.category}</p>
<p>❓ Questions: ${test.questions}</p>
<p>⏱ Time: ${test.time} Minutes</p>

<a class="start-btn"
href="test.html?test_id=${test.id}">
Start Test
</a>

</div>
`;

});

}

function filterTests(category){

document
.querySelectorAll(".filter-btn")
.forEach(btn=>btn.classList.remove("active"));

event.target.classList.add("active");

if(category==="all"){
displayTests(allTests);
return;
}

displayTests(
allTests.filter(
t=>t.category.toUpperCase()===category.toUpperCase()
)
);

}

document
.getElementById("search")
.addEventListener("keyup",function(){

const text=this.value.toLowerCase();

displayTests(
allTests.filter(
t=>t.title.toLowerCase().includes(text)
)
);

});

loadTests();

</script>

</body>
</html>
