```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test Series Admin Panel</title>
<style>
body{
font-family:Arial;
max-width:600px;
margin:auto;
padding:20px;
}
input{
width:100%;
padding:10px;
margin:8px 0;
}
button{
padding:10px 20px;
cursor:pointer;
}
#result{
margin-top:15px;
font-weight:bold;
}
</style>
</head>
<body>

<h2>Add New Test</h2>

<input type="text" id="testId" placeholder="Test ID">

<input type="text" id="title" placeholder="Test Title">

<input type="number" id="price" placeholder="Price">

<button onclick="addTest()">Add Test</button>

<div id="result"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxVJ3KHit_N5VknZuyJ8XjtDeX8d1hrGPuemyHUFVpCVkls3vIgPCHx9I6FdjHoD-s/exec";

async function addTest(){

const data = {
testId: document.getElementById("testId").value,
title: document.getElementById("title").value,
price: document.getElementById("price").value
};

try{

const response = await fetch(API,{
method:"POST",
body:JSON.stringify(data)
});

const result = await response.text();

document.getElementById("result").innerHTML = result;

alert("Test Added Successfully");

}catch(error){

document.getElementById("result").innerHTML =
"Error : " + error;

console.log(error);

}

}

</script>

</body>
</html>
